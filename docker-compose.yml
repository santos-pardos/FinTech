version: '3.8'

# Configuración de la aplicación FinTech Solutions S.A.
# Desarrollado por TechOps Solutions

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: fintech_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintech_db
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_pass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech_user -d fintech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fintech_db
      DB_USER: fintech_user
      DB_PASSWORD: fintech_pass123
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fintech_network
    ports:
      - "3001:3001"

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintech_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:3001
    depends_on:
      - backend
    networks:
      - fintech_network
    ports:
      - "80:80"

networks:
  fintech_network:
    driver: bridge
    name: fintech_network

volumes:
  postgres_data:
    driver: local
    name: fintech_postgres_data